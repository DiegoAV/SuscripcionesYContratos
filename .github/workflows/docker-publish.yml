name: Deploy to VPS

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH (git pull + docker-compose up)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 30m   # or 60m if builds are slow
          timeout: 60s           # SSH connect timeout (optional)
          script: |
            set -e

            APP_DIR="${{ vars.DEPLOY_APP_DIR }}"
            REPO_URL="https://github.com/DiegoAV/SuscripcionesYContratos.git"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -d "SuscripcionesYContratos/.git" ]; then
              rm -rf SuscripcionesYContratos
              git clone "$REPO_URL"
            else
              cd SuscripcionesYContratos
              git fetch --all --prune
              git reset --hard origin/master
              cd ..
            fi

            # Deploy
            cd SuscripcionesYContratos
            
            # Recommended: pull/build explicitly so you see where time is spent
            docker compose pull --quiet || true
            docker compose build --pull
      
            docker compose up -d --remove-orphans
