services:
  api:
    image: tosmuer/suscripcionesycontratos-api:${IMAGE_TAG:-7.0.0}
    ports:
      - "6670:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=db;Port=5432;Database=SuscripcionesYContratos;Username=postgres;Password=3541079;Include Error Detail=true"
    depends_on:
      - db

  db:
    image: postgres:16
    ports:
      - "6669:5432"
    environment:
      POSTGRES_DB: SuscripcionesYContratos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 3541079
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
